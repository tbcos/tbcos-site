<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THREE BODY Auth Callback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet">
  <script>
    tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["DM Sans", "sans-serif"],
            serif: ["Noto Serif", "serif"]
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="min-h-screen bg-[linear-gradient(180deg,#fbfaf8_0%,#f5f4f0_100%)] font-sans text-[#111]">
  <div class="fixed right-5 top-5 inline-flex rounded-full bg-black/5 p-1">
    <button type="button" class="lang-btn rounded-full px-3 py-2 text-xs font-bold text-[#6c6a67] transition" data-lang="en">EN</button>
    <button type="button" class="lang-btn rounded-full px-3 py-2 text-xs font-bold text-[#6c6a67] transition" data-lang="ko">KR</button>
  </div>

  <main class="grid min-h-screen place-items-center px-5">
    <section class="w-full max-w-xl rounded-[32px] border border-white/80 bg-white/85 px-8 py-10 text-center shadow-[0_24px_60px_rgba(17,17,17,0.06)] backdrop-blur-[14px]">
      <h1 class="font-serif text-4xl font-normal tracking-[-0.04em] text-[#111] md:text-5xl" data-i18n="callback_heading">Completing sign-in</h1>
      <p id="callbackStatus" class="mt-4 text-base leading-8 text-[#6c6a67]" data-i18n="callback_waiting">Waiting for your THREE BODY account session.</p>
    </section>
  </main>

  <script type="module" src="assets/js/auth-callback.js"></script>
</body>
</html>
