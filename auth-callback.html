<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THREE BODY Auth Callback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet">
  <script>
    tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["DM Sans", "sans-serif"],
            serif: ["Noto Serif", "serif"]
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
    .lang-switch {
      position: relative;
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: center;
      padding: 4px;
      border: 1px solid rgba(17, 17, 17, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
      overflow: hidden;
    }

    .lang-thumb {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      border-radius: 999px;
      background: #6b6f67;
      box-shadow: 0 8px 20px rgba(93, 97, 90, 0.16);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .lang-switch[data-active="ko"] .lang-thumb {
      transform: translateX(100%);
    }

    .lang-btn {
      position: relative;
      z-index: 1;
      min-width: 42px;
      border: none;
      background: transparent;
      color: #6c6a67;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .lang-btn.active {
      color: #f7f5ef;
    }
  </style>
</head>
<body class="min-h-screen bg-[linear-gradient(180deg,#fbfaf8_0%,#f5f4f0_100%)] font-sans text-[#111]">
  <div class="lang-switch fixed right-5 top-5" data-active="en">
    <span class="lang-thumb" aria-hidden="true"></span>
    <button type="button" class="lang-btn active" data-lang="en">EN</button>
    <button type="button" class="lang-btn" data-lang="ko">KR</button>
  </div>

  <main class="grid min-h-screen place-items-center px-5">
    <section class="w-full max-w-xl rounded-[32px] border border-white/80 bg-white/85 px-8 py-10 text-center shadow-[0_24px_60px_rgba(17,17,17,0.06)] backdrop-blur-[14px]">
      <h1 class="font-serif text-4xl font-normal tracking-[-0.04em] text-[#111] md:text-5xl" data-i18n="callback_heading">Completing sign-in</h1>
      <p id="callbackStatus" class="mt-4 text-base leading-8 text-[#6c6a67]" data-i18n="callback_waiting">Waiting for your THREE BODY account session.</p>
    </section>
  </main>

  <script type="module" src="assets/js/auth-callback.js"></script>
</body>
</html>
