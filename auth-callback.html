<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THREE BODY Auth Callback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #fbfaf8 0%, #f5f4f0 100%);
      color: #111;
      font-family: "DM Sans", sans-serif;
    }

    .card {
      width: min(540px, calc(100% - 40px));
      padding: 40px 34px;
      text-align: center;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 24px 60px rgba(17, 17, 17, 0.06);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      font-family: "Noto Serif", serif;
      font-weight: 400;
      font-size: clamp(2.2rem, 5vw, 3rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 18px 0 0;
      color: #6c6a67;
      line-height: 1.75;
    }

    .lang-switcher {
      position: fixed;
      top: 20px;
      right: 20px;
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      background: rgba(17, 17, 17, 0.05);
      border-radius: 999px;
    }

    .lang-btn {
      border: 0;
      background: transparent;
      color: #6c6a67;
      border-radius: 999px;
      padding: 8px 12px;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #5f685e;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="lang-switcher">
    <button type="button" class="lang-btn" data-lang="en">EN</button>
    <button type="button" class="lang-btn" data-lang="ko">KR</button>
  </div>
  <section class="card">
    <h1 data-i18n="callback_heading">Completing sign-in</h1>
    <p id="callbackStatus" data-i18n="callback_waiting">Waiting for your TBcos account session.</p>
  </section>
  <script type="module" src="assets/js/auth-callback.js"></script>
</body>
</html>
