<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | THREE BODY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Serif:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400" rel="stylesheet">
  <script>
    tailwind = window.tailwind || {};
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page: "#f5f4f0",
            ink: "#111111",
            muted: "#6c6a67",
            line: "rgba(17,17,17,0.08)"
          },
          fontFamily: {
            sans: ["DM Sans", "sans-serif"],
            serif: ["Noto Serif", "serif"]
          },
          boxShadow: {
            soft: "0 24px 60px rgba(17,17,17,0.06)"
          }
        }
      }
    };
  </script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>
    .lang-switch {
      position: relative;
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: center;
      padding: 4px;
      border: 1px solid rgba(17, 17, 17, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
      overflow: hidden;
    }

    .lang-thumb {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      border-radius: 999px;
      background: #6b6f67;
      box-shadow: 0 8px 20px rgba(93, 97, 90, 0.16);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .lang-switch[data-active="ko"] .lang-thumb {
      transform: translateX(100%);
    }

    .lang-btn {
      position: relative;
      z-index: 1;
      min-width: 42px;
      border: none;
      background: transparent;
      color: #6c6a67;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .lang-btn.active {
      color: #f7f5ef;
    }
  </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top_left,rgba(173,189,210,0.24),transparent_24%),linear-gradient(180deg,#fbfaf8_0%,#f5f4f0_100%)] font-sans text-ink">
  <div class="mx-auto max-w-3xl px-4 pb-12 pt-5 sm:px-6 sm:pb-16 sm:pt-7">
    <div class="mb-8 flex items-center justify-between gap-3 sm:mb-11">
      <a href="auth.html" class="inline-flex min-w-0 items-center gap-1.5 text-sm font-semibold text-ink no-underline">
        <span class="material-symbols-outlined text-[18px] leading-none">arrow_back</span>
        <span class="truncate" data-i18n="reset_to_login">Back to Sign In</span>
      </a>
      <div class="lang-switch" data-active="en">
        <span class="lang-thumb" aria-hidden="true"></span>
        <button type="button" class="lang-btn active" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="ko">KR</button>
      </div>
    </div>

    <section class="rounded-[28px] border border-white/70 bg-white/80 p-6 shadow-soft backdrop-blur-[14px] sm:rounded-[32px] sm:p-10">
      <p class="mb-4 text-[11px] uppercase tracking-[0.28em] text-black/45">Supabase Recovery</p>
      <h1 class="font-serif text-[clamp(1.9rem,5vw,2.5rem)] font-normal leading-tight tracking-[-0.04em] text-ink" data-i18n="reset_heading">Create a new password</h1>
      <p class="mt-4 text-[15px] leading-7 text-muted sm:text-base sm:leading-8" data-i18n="reset_intro">Enter a new password to finish recovering your partner account.</p>

      <div id="resetStatus" class="min-h-6 pt-4 text-sm text-muted"></div>

      <form id="resetPasswordForm" class="mt-2 grid gap-4">
        <div class="grid gap-2">
          <label for="resetPassword" class="text-[13px] font-bold text-ink" data-i18n="reset_new_password">New Password</label>
          <input id="resetPassword" type="password" placeholder="Enter a new password" data-i18n-placeholder="reset_new_password_placeholder" required class="w-full rounded-2xl border border-line bg-white/90 px-4 py-3.5 text-sm text-ink outline-none transition focus:border-black/20 focus:outline focus:outline-2 focus:outline-black/10">
        </div>
        <div class="grid gap-2">
          <label for="resetPasswordConfirm" class="text-[13px] font-bold text-ink" data-i18n="reset_confirm_password">Confirm Password</label>
          <input id="resetPasswordConfirm" type="password" placeholder="Re-enter your new password" data-i18n-placeholder="reset_confirm_password_placeholder" required class="w-full rounded-2xl border border-line bg-white/90 px-4 py-3.5 text-sm text-ink outline-none transition focus:border-black/20 focus:outline focus:outline-2 focus:outline-black/10">
        </div>
        <button class="mt-1 w-full rounded-2xl border border-white/60 bg-white/30 px-5 py-4 text-sm font-bold text-ink shadow-[0_10px_28px_rgba(93,97,90,0.12)] backdrop-blur-[14px] transition hover:-translate-y-0.5 hover:border-white/80 hover:bg-white/40 hover:shadow-[0_14px_34px_rgba(93,97,90,0.18)]" type="submit" data-i18n="reset_submit">Save New Password</button>
      </form>
    </section>
  </div>

  <script type="module" src="assets/js/reset-password.js"></script>
</body>
</html>
